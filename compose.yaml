services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: murmur
      POSTGRES_PASSWORD: murmur
      POSTGRES_DB: murmur
    ports:
      - "5432:5432"
    volumes:
      # Named volume: data survives container stop/removal/recreation.
      - murmur-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U murmur -d murmur"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  murmur-pgdata:
